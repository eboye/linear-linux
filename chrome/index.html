<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="chrome.css">
</head>
<body>
<div class="titlebar">
  <div class="tabs" id="tabs"></div>
  <button id="new-tab" class="control" title="New tab">+</button>
  <div class="drag"></div>
  <div class="window-controls">
    <button id="min" class="control" title="Minimize">&#x2013;</button>
    <button id="max" class="control" title="Maximize">&#x25A1;</button>
    <button id="close" class="control close" title="Close">&#x2715;</button>
  </div>
</div>
<script src="chrome.js"></script>
</body>
</html>
